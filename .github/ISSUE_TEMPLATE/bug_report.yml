name: Bug report
description: Something in TemperLoop is broken or doesn't do what it documents.
title: "[bug]: "
labels:
  - bug
  - fnd:status:backlog
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.

        **Privacy warning — do not paste private repository content.** No
        tokens, credentials, hostnames, private issue/PR text, or logs from
        a repo you don't intend to make public. Describe the *shape* of the
        problem (what command, what happened, what you expected) rather
        than pasting raw output from a private checkout. See
        `docs/CONTRIBUTING.md` § "Be scrubbed" for the same rule this repo
        applies to its own contributed docs.

        **What happens after you submit.** This form drops the issue
        straight into this repo's own tracker Backlog (the
        `fnd:status:backlog` label — see
        `workflows/scripts/board/ISSUES-ONLY-BACKEND.md`). It's picked up
        the next time `/triage` sweeps that Backlog — every issue filed
        this way is swept, not just the ones a maintainer happens to
        notice; see `docs/features/funnel-driver.md` for the (optional,
        maintainer-side) scheduled-tick machinery some checkouts run this
        under. There's no fixed response-time SLA, but nothing filed here
        is silently dropped.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you run, what did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: >-
        Minimal steps and the exact command(s) you ran. Redact anything
        private from any pasted output.
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: TemperLoop version / commit
      description: A git rev, tag, or release version, if you know it.
    validations:
      required: false
