# kernel/bin/lib/cost-estimates.conf — hardcoded, DIRECTIONAL cost-estimate
# constants consumed by `foundation try` (foundation #765 Epic D, item
# foundation-try / #852).
#
# PROVENANCE (per the epic plan note's second-pass review — "Unbuildable
# cost-estimate mechanism": meta/ is overlay, it does not exist for a
# stranger's kernel-only install, so nothing here may read a runtime rollup
# or a live pricing API):
#   derived:  2026-07-03
#   source:   a one-time, by-hand snapshot of operator telemetry rollups
#             (meta/data/rollups/*, Travis's own foundation checkout — a
#             private, overlay-only data source). Copied out once; this
#             file carries NO runtime dependency on that data existing.
#   method:   average observed $/classification-turn for a single-issue
#             triage judgment (model input+output tokens at list-price,
#             ordinary-size issue body, no unusual context-cache miss),
#             rounded to a directional [low, high] band — not a point
#             estimate, since actual spend varies with issue body length,
#             model choice, and cache-hit rate.
#   caveat:   DIRECTIONAL ONLY. Not a quote, not a pricing-API read, not
#             recalculated at runtime, not tied to any particular model's
#             current price sheet. Refresh ONLY via a normal upstream PR
#             hand-editing the numbers below — there is no regeneration
#             script (the regeneration concern, and the telemetry it would
#             read, stays overlay-side; see the epic plan note's
#             "## Re-triage signals").
#
# Shell-sourced (bash 3.2-compatible plain assignments only — no arrays, no
# associative arrays, no `${var,,}`). Every consumer treats these as
# USD-per-open-issue bands for a SHADOW-TRIAGE CLASSIFICATION PASS ONLY —
# never a build/PR cost, which is a materially larger, separate spend this
# file does not attempt to estimate.

# Directional per-issue classification cost band (USD), low/high.
TRY_COST_PER_ISSUE_LOW_USD="0.02"
TRY_COST_PER_ISSUE_HIGH_USD="0.08"

# Hard mechanical spend cap (USD) handed to the shadow-triage `claude -p`
# call itself via --max-budget-usd — belt-and-suspenders alongside the
# printed estimate above: even if the directional estimate is wrong, the
# live call cannot silently exceed this. Not a flag (no CLI surface here on
# purpose — a stranger's very first `foundation try` should not have to
# discover a budget flag to be protected).
TRY_CLAUDE_MAX_BUDGET_USD="1.00"
